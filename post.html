<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>My Blog</title>
	<link rel="stylesheet" href="css/style.css">
	<link id="hljs-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
</head>
<body>

<header class="site-header">
	<div class="container">
		<a href="index.html" class="site-title">My Blog</a>
		<button id="theme-toggle" aria-label="테마 전환">🌙</button>
	</div>
</header>

<main>
	<div class="container">
		<nav class="post-nav">
			<a href="index.html" class="back-link">← 목록으로</a>
		</nav>

		<article>
			<header class="post-header">
				<h1 id="post-title"></h1>
				<div id="post-meta" class="post-meta"></div>
			</header>
			<div id="post-body" class="post-body"></div>
		</article>
	</div>
</main>

<footer class="site-footer">
	<div class="container">
		<span>My Blog</span>
	</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script type="module" src="js/post.js"></script>
</body>
</html>
