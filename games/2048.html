<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048 — My Blog</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/2048.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="../index.html" class="site-title">My Blog</a>
      <nav class="site-nav">
        <a href="2048.html" class="nav-link">2048</a>
        <a href="pixel-art.html" class="nav-link">픽셀 아트</a>
      </nav>
      <button id="theme-toggle" aria-label="테마 전환">🌙</button>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="game-header">
        <h1>2048</h1>
        <p class="game-desc">같은 숫자 타일을 합쳐 2048을 만드세요!</p>
      </div>

      <div class="scoreboard">
        <div class="score-box">
          <span class="score-label">점수</span>
          <span class="score-value" id="score-display">0</span>
        </div>
        <div class="score-box">
          <span class="score-label">최고</span>
          <span class="score-value" id="best-display">0</span>
        </div>
      </div>

      <div class="game-controls">
        <button id="new-game-btn">새 게임</button>
      </div>

      <div class="board-wrapper">
        <div class="board" id="board">
          <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
          <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
          <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
          <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        </div>
        <div class="game-message" id="game-message">
          <p id="game-message-text"></p>
          <button id="retry-btn">다시 시도</button>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>My Blog</p>
    </div>
  </footer>

  <script type="module" src="../js/theme.js"></script>
  <script type="module" src="../js/2048.js"></script>
</body>
</html>
